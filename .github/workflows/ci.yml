name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: trainer/package-lock.json

      - name: Install dependencies
        run: npm ci
        working-directory: trainer

      - name: Lint
        run: npm run lint
        working-directory: trainer

      - name: Format Check
        run: npx prettier --check .
        working-directory: trainer

      - name: Type Check
        run: npm run check
        working-directory: trainer

      - name: Test
        run: npm run test
        working-directory: trainer
