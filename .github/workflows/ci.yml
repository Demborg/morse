name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  trainer:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: trainer/package-lock.json

      - name: Install dependencies
        run: npm ci
        working-directory: trainer

      - name: Lint
        run: npm run lint
        working-directory: trainer

      - name: Format Check
        run: npx prettier --check .
        working-directory: trainer

      - name: Type Check
        run: npm run check
        working-directory: trainer

      - name: Test
        run: npm run test
        working-directory: trainer

  firmware:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Cache pip
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('**/platformio.ini') }}
          restore-keys: |
            ${{ runner.os }}-pip-

      - name: Cache PlatformIO
        uses: actions/cache@v4
        with:
          path: ~/.platformio
          key: ${{ runner.os }}-platformio-${{ hashFiles('**/platformio.ini') }}
          restore-keys: |
            ${{ runner.os }}-platformio-

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install PlatformIO
        run: pip install -U platformio

      - name: Build Firmware
        run: pio run
        working-directory: firmware

      - name: Static Analysis
        run: pio check --fail-on-defect low --skip-packages
        working-directory: firmware
